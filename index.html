<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>U25 Campus Leaderboard</title>

  <!-- CUSTOM FAVICON -->
  <link rel="icon" type="image/png" href="Favicon.png">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

  body {
  background: #ffffff;
  color: #000;
  font-family: Arial, sans-serif;
  padding: 40px 20px;
}

    .container {
      max-width: 900px;
      margin: auto;
    }

   h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 42px;
  color: #000;
}

    /* ========================= */
    /* LIVE STATS BAR */
    /* ========================= */

 .stats-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-top: -10px;
  margin-bottom: 25px;
  flex-wrap: wrap;
}

    .live-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #000;
  font-size: 14px;
  letter-spacing: 1px;
}

    .live-dot {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(1.3);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }

    }

.total-box {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  color: #000;
}

   #totalCounter {
  font-size: 20px;
  font-weight: bold;
  color: #000;
  display: inline-block;
  min-width: 70px;
}

  

    /* ========================= */
    /* TABLE */
    /* ========================= */

    table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 18px;
  background: #4d298e;
}

   thead {
  background: #fecd2a;
}

    th {
  padding: 18px;
  text-align: center;
  font-size: 20px;
  letter-spacing: 1px;
  color: #000;
}

 td {
  padding: 18px;
  border-top: 1px solid rgba(255,255,255,0.12);
  transition: 0.2s ease;
  text-align: center;
  font-size: 18px;
  color: #fff;
}

    tr {
      transition: all 0.2s ease;
    }

    tr:hover {
  background: #6137af;
  transform: scale(1.01);
}
    thead tr:hover {
  background: #fecd2a;
  transform: none;
}

    .rank {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    /* ========================= */
    /* TOP 3 */
    /* ========================= */

    .top1 {
  background: #FFD700;
}

.top1 td {
  color: #000;
  font-weight: bold;
}

.top2 {
  background: #C0C0C0;
}

.top2 td {
  color: #000;
  font-weight: bold;
}

.top3 {
  background: #CD7F32;
}

.top3 td {
  color: #000;
  font-weight: bold;
}
    /* ========================= */
    /* LOADING */
    /* ========================= */

    .loading {
      text-align: center;
      margin-top: 40px;
      color: #999;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      color: #666;
      font-size: 13px;
    }

    /* ========================= */
    /* MOBILE */
    /* ========================= */

    @media(max-width: 600px) {

      h1 {
        font-size: 30px;
      }

      .stats-bar {
        justify-content: center;
      }

      td,
      th {
        padding: 14px 10px;
        font-size: 14px;
      }

      .rank {
        font-size: 18px;
      }

      #totalCounter {
        font-size: 22px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>🏆 Live Leaderboard</h1>

    <!-- ========================= -->
    <!-- LIVE COUNTER -->
    <!-- ========================= -->

  <div class="stats-bar">

  <div class="live-indicator">
    <span class="live-dot"></span>
    LIVE
  </div>

<div class="total-box">
  Total Registrations
  <span id="totalCounter">0</span>
</div>

</div>

    <!-- ========================= -->
    <!-- TABLE -->
    <!-- ========================= -->

    <table>

      <thead>
        <tr>
          <th>Rank</th>
          <th>College Name</th>
          <th>Registrations</th>
        </tr>
      </thead>

      <tbody id="leaderboardBody">
      </tbody>

    </table>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <div class="loading" id="loading">
      Loading leaderboard...
    </div>

    <div class="footer">
      ⚡ Auto-refreshes every 10 seconds ⚡
    </div>

  </div>

  <script>

    // ==========================================
    // GOOGLE SHEET CONFIG
    // ==========================================

    const SHEET_ID =
      "1djU2TYYAbiuUVUetCm2PDihD1MqPr7odh_ChLjy4qtw";

    const SHEET_NAME =
      "Leaderboard";

    // ==========================================

    const API_URL =
      `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

    let leaderboardData = [];

    // ==========================================
    // FETCH DATA
    // ==========================================

    async function fetchLeaderboard() {

      try {

        const response =
          await fetch(API_URL);

        const data =
          await response.json();

        // SORT DESCENDING

        data.sort((a, b) =>
          Number(b.Referrals) -
          Number(a.Referrals)
        );

        // PRESERVE ORIGINAL RANKS

        leaderboardData =
          data.map((player, index) => ({

            ...player,

            actualRank: index + 1

          }));

        // RENDER TABLE

        renderLeaderboard(leaderboardData);

        // UPDATE TOTAL COUNTER

        const total =
          getTotalReferrals(leaderboardData);

        const counter =
          document.getElementById("totalCounter");

        const currentValue =
          Number(
            counter.innerText.replace(/,/g, "")
          ) || 0;

        animateCounter(
          counter,
          currentValue,
          total
        );

        document
          .getElementById("loading")
          .style.display = "none";

      }

      catch (error) {

        console.error(error);

        document
          .getElementById("loading")
          .innerHTML =
          "Failed to load leaderboard.";

      }

    }

    // ==========================================
    // RANK DISPLAY
    // ==========================================

    function getRankDisplay(rank) {

      if (rank === 1) return "🥇";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";

      return rank;

    }

    // ==========================================
    // TOTAL REFERRALS
    // ==========================================

    function getTotalReferrals(data) {

      return data.reduce((sum, player) => {

        return sum +
          Number(player.Referrals || 0);

      }, 0);

    }

    // ==========================================
    // ANIMATE COUNTER
    // ==========================================

    function animateCounter(
      element,
      start,
      end,
      duration = 1000
    ) {

      let startTimestamp = null;

      function step(timestamp) {

        if (!startTimestamp)
          startTimestamp = timestamp;

        const progress =
          Math.min(
            (timestamp - startTimestamp)
            / duration,
            1
          );

        const current =
          Math.floor(
            progress * (end - start)
            + start
          );

        element.innerText =
          current.toLocaleString();

        if (progress < 1) {

          requestAnimationFrame(step);

        }

      }

      requestAnimationFrame(step);

    }

    // ==========================================
    // RENDER TABLE
    // ==========================================

    function renderLeaderboard(data) {

      const tbody =
        document.getElementById(
          "leaderboardBody"
        );

      tbody.innerHTML = "";

      data.forEach((player) => {

        const row =
          document.createElement("tr");

        if (player.actualRank === 1)
          row.classList.add("top1");

        if (player.actualRank === 2)
          row.classList.add("top2");

        if (player.actualRank === 3)
          row.classList.add("top3");

        row.innerHTML = `

          <td class="rank">
            ${getRankDisplay(player.actualRank)}
          </td>

          <td>
            ${player.Name}
          </td>

          <td>
            ${player.Referrals}
          </td>

        `;

        tbody.appendChild(row);

      });

    }


    // ==========================================
    // INITIAL LOAD
    // ==========================================

    fetchLeaderboard();

    // ==========================================
    // AUTO REFRESH
    // ==========================================

    setInterval(fetchLeaderboard, 10000);

  </script>

</body>

</html>
